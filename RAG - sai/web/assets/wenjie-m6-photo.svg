    <linearGradient id="glass" x1="280" y1="92" x2="577" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101318"/>
      <stop offset="0.58" stop-color="#25282d"/>
      <stop offset="1" stop-color="#050609"/>
    </linearGradient>
    <radialGradient id="wheel" cx="50%" cy="50%" r="55%">
      <stop offset="0" stop-color="#e9edf0"/>
      <stop offset="0.16" stop-color="#c2c9cf"/>
      <stop offset="0.2" stop-color="#181a1e"/>
      <stop offset="0.7" stop-color="#0a0c10"/>
      <stop offset="1" stop-color="#30343a"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#07080a" flood-opacity="0.45"/>
    </filter>
    <filter id="cyanGlow" x="-80%" y="-150%" width="260%" height="400%">
