      <stop offset="0.55" stop-color="#14161a"/>
      <stop offset="1" stop-color="#c1c4c6"/>
    </linearGradient>
    <linearGradient id="paint" x1="80" y1="154" x2="622" y2="262" gradientUnits="userSpaceOnUse">
