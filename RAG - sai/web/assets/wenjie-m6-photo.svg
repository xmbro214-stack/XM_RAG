<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 380" role="img" aria-labelledby="title desc">
  <title id="title">AITO Wenjie M6</title>
  <desc id="desc">A studio-style front three-quarter view of a silver Wenjie M6 with dark glass, cyan running lights, and a front plate.</desc>
  <defs>
    <linearGradient id="studio" x1="0" y1="0" x2="1" y2="1">
